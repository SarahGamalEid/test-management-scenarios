<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test Lead Assessment Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0c0f; --surface: #111418; --border: #252b35; --text: #d8dde8;
  --accent: #00e5ff; --green: #22c55e; --red: #ef4444;
}
body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'DM Sans', sans-serif; 
    padding: 20px; 
    line-height: 1.6; 
}
#app { max-width: 800px; margin: 0 auto; }
.card { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    padding: 24px; 
    margin-bottom: 20px; 
}
h3 { 
    font-family: 'Syne', sans-serif; 
    color: #fff; 
    margin-bottom: 10px; 
}
input, textarea { 
    width: 100%; 
    background: #000; 
    border: 1px solid var(--border); 
    border-radius: 6px;
    color: var(--text); 
    padding: 12px; 
    font-family: 'Space Mono', monospace; 
    margin-top: 10px; 
    outline: none;
}
.btn { 
    background: var(--accent); 
    color: #000; 
    padding: 14px; 
    border: none; 
    border-radius: 6px; 
    font-weight: bold; 
    cursor: pointer; 
    width: 100%; 
    margin-top: 20px; 
    font-family: 'Syne';
}
.hidden { display: none; }
.feedback-box { 
    border-left: 4px solid var(--red); 
    background: rgba(239, 68, 68, 0.1); 
    padding: 15px; 
    margin: 15px 0; 
    border-radius: 4px; 
    white-space: pre-wrap; 
}
.perfect-box { 
    border-left: 4px solid var(--green); 
    background: rgba(34, 197, 94, 0.1); 
    padding: 15px; 
    margin: 15px 0; 
    border-radius: 4px; 
    white-space: pre-wrap; 
}
#loader { 
    text-align: center; 
    color: var(--accent); 
    font-family: 'Space Mono'; 
    margin: 20px 0; 
}
#scenario-title {
    font-size: 1.1em;
    color: var(--accent);
    margin-bottom: 12px;
}
</style>
</head>
<body>

<div id="app">
    <header style="text-align: center; margin-bottom: 30px;">
        <h1 style="font-family: 'Syne'; color: #fff;">TEST LEAD <span style="color:var(--accent)">EVALUATOR</span></h1>
    </header>

    <div class="card">
        <h3>1. Gemini API Key</h3>
        <input type="password" id="api-key" placeholder="Enter your Gemini API Key (starts with AIza...)">
        <small style="color:#888; display:block; margin-top:8px;">
            Get your key from <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent)">Google AI Studio</a>
        </small>
    </div>

    <div class="card">
        <h3>2. Scenario Assessment</h3>
        <div id="scenario-title"></div>
        <p id="scenario" style="background:#1a1f28; padding:16px; border-radius:8px; line-height:1.7;"></p>
        <textarea id="user-answer" rows="9" placeholder="Type your structured answer here..."></textarea>
        <button class="btn" onclick="validateAnswer()">VALIDATE WITH GEMINI</button>
    </div>

    <div id="loader" class="hidden">🤖 POLLING GEMINI FLASH...</div>

    <div id="results" class="hidden">
        <div class="card">
            <h3 style="color: var(--red);">📋 Your Feedback</h3>
            <div id="missing-content" class="feedback-box"></div>

            <h3 style="color: var(--green); margin-top:30px;">🚀 How a Senior Test Lead Should Answer</h3>
            <div id="perfect-content" class="perfect-box"></div>
            
            <button class="btn" style="background: #222; color: #fff;" onclick="loadNewScenario()">TRY NEW SCENARIO</button>
        </div>
    </div>
</div>

<script>
// Multiple Scenarios
// Multiple Scenarios
const scenarios = [
   
    {
        title: "Scenario 6: Small Team",
        text: `You lead a team of 5 testers.\n\nSituation:\n• Release in 5 days\n• 30% test cases still not executed\n• 2 testers are stuck on automation failures\n• Developer says “no bugs in latest build”\n• Manager asks you: “Will we meet release date?”\n\nYour turn\nAnswer step by step:\n\n1. What do you do today first?\n2. How do you handle stuck automation testers?\n3. What do you report to your manager?\n4. Do you say yes, no, or “depends” to release date?\n\nReply in structured points.`
    }
];

let currentScenarioIndex = -1;

// Load a new random scenario (different from current)
function loadNewScenario() {
    document.getElementById('results').classList.add('hidden');
    document.getElementById('user-answer').value = '';

    let newIndex;
    do {
        newIndex = Math.floor(Math.random() * scenarios.length);
    } while (newIndex === currentScenarioIndex && scenarios.length > 1);

    currentScenarioIndex = newIndex;
    
    const sc = scenarios[currentScenarioIndex];
    
    document.getElementById('scenario-title').innerHTML = `<strong>${sc.title}</strong>`;
    document.getElementById('scenario').innerHTML = sc.text.replace(/\n/g, '<br>');
}

async function validateAnswer() {
    const key = document.getElementById('api-key').value.trim();
    const answer = document.getElementById('user-answer').value.trim();
    const scenarioText = document.getElementById('scenario').innerText;
    
    if (!key) return alert("❌ API Key is required.");
    if (answer.length < 30) return alert("❌ Please provide a detailed response (minimum 30 characters).");

    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('results').classList.add('hidden');

    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${key}`;

    const prompt = `
You are a strict Senior Test Lead mentor evaluating a candidate.

Scenario: ${scenarioText}

Candidate Answer: "${answer}"

Provide your response in EXACTLY this format:

[MISSING]
What you did well

* Point 1
* Point 2

Gaps you must fix
1) Gap title
   Explanation of the problem.
   Interview expectation:

   What is missing:

   * sub-point
   * sub-point

   Stronger version:

   * example
   * example

2) Next gap...

[PERFECT]
How a Test Lead should answer
1) Immediate actions
   * bullet
   * bullet

2) Handling...
   * bullet

3) Communication / Reporting
   * bullet

Your upgrade thinking rule
• Think in terms of Risk, Coverage, Impact, and Confidence
`;

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.7, maxOutputTokens: 2000 }
            })
        });

        const data = await response.json();

        if (data.error) throw new Error(data.error.message);

        const rawText = data.candidates[0].content.parts[0].text.trim();
        
        let missingPart = rawText;
        let perfectPart = "";

        if (rawText.includes('[PERFECT]')) {
            const parts = rawText.split('[PERFECT]');
            missingPart = parts[0].replace('[MISSING]', '').trim();
            perfectPart = parts[1] ? parts[1].trim() : perfectPart;
        }

        document.getElementById('missing-content').innerText = missingPart;
        document.getElementById('perfect-content').innerText = perfectPart || "Ideal answer not generated.";
        
        document.getElementById('results').classList.remove('hidden');
        document.getElementById('results').scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
        alert("CRITICAL ERROR: " + err.message);
    } finally {
        document.getElementById('loader').classList.add('hidden');
    }
}

// Load first scenario on page load
window.onload = loadNewScenario;
</script>

</body>
</html>
