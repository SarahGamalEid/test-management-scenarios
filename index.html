<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test Lead Assessment Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0c0f; --surface: #111418; --border: #252b35; --text: #d8dde8;
  --accent: #00e5ff; --green: #22c55e; --red: #ef4444;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; line-height: 1.6; }
#app { max-width: 800px; margin: 0 auto; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
h3 { font-family: 'Syne', sans-serif; color: #fff; margin-bottom: 10px; }
input, textarea { 
    width: 100%; background: #000; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 12px; font-family: 'Space Mono', monospace; margin-top: 10px;
}
.btn { 
    background: var(--accent); color: #000; padding: 12px 24px; border: none; 
    border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px;
}
.hidden { display: none; }
.feedback { border-left: 4px solid var(--red); background: rgba(239, 68, 68, 0.1); padding: 15px; margin: 15px 0; border-radius: 4px; }
.perfect { border-left: 4px solid var(--green); background: rgba(34, 197, 94, 0.1); padding: 15px; margin: 15px 0; border-radius: 4px; }
#loader { text-align: center; color: var(--accent); font-family: 'Space Mono'; margin: 20px 0; }
</style>
</head>
<body>

<div id="app">
    <div class="card">
        <h3>1. API Configuration</h3>
        <input type="password" id="api-key" placeholder="Enter Gemini API Key (AIza...)">
    </div>

    <div class="card">
        <h3>2. Scenario Assessment</h3>
        <p id="scenario">Scenario: A critical bug is found 1 day before release. The product owner wants to launch anyway. What is your action plan as a Test Lead?</p>
        <textarea id="user-answer" rows="5" placeholder="Type your response here..."></textarea>
        <button class="btn" onclick="validateAction()">Analyze Answer</button>
    </div>

    <div id="loader" class="hidden">POLLING GEMINI AI...</div>

    <div id="results" class="hidden">
        <div class="card">
            <h3 style="color: var(--red);">Gaps Identified</h3>
            <div id="missing-box" class="feedback"></div>
            <h3 style="color: var(--green);">The Perfect Response</h3>
            <div id="perfect-box" class="perfect"></div>
        </div>
    </div>
</div>

<script>
async function validateAction() {
    const key = document.getElementById('api-key').value.trim();
    const answer = document.getElementById('user-answer').value.trim();
    
    if (!key) return alert("API Key Required");
    if (answer.length < 10) return alert("Please provide a more detailed answer.");

    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('results').classList.add('hidden');

    // USING THE STABLE v1 BETA ENDPOINT WITH THE BASE MODEL NAME
    // This is the most compatible configuration for 2026 regional availability
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

    const payload = {
        contents: [{
            parts: [{
                text: `Task: Evaluate this Test Lead answer.
                       Question: ${document.getElementById('scenario').innerText}
                       Answer: ${answer}
                       
                       Return your response exactly in this format:
                       MISSING: [list missing points]
                       PERFECT: [provide perfect answer]`
            }]
        }]
    };

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.error) {
            throw new Error(`${data.error.message} (Code: ${data.error.code})`);
        }

        const text = data.candidates[0].content.parts[0].text;
        
        // Simple Split Logic
        const parts = text.split('PERFECT:');
        document.getElementById('missing-box').innerText = parts[0].replace('MISSING:', '').trim();
        document.getElementById('perfect-box').innerText = parts[1] ? parts[1].trim() : "Perfect answer could not be generated.";
        
        document.getElementById('results').classList.remove('hidden');

    } catch (err) {
        console.error(err);
        alert("CRITICAL ERROR: " + err.message + "\n\nTip: Ensure your key is from Google AI Studio and has 'Gemini API' enabled.");
    } finally {
        document.getElementById('loader').classList.add('hidden');
    }
}
</script>

</body>
</html>
